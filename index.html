<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>AI Cybersecurity Chat</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        #chat-box { height: 300px; border: 1px solid #ccc; overflow-y: scroll; margin-bottom: 10px; padding: 10px; background: white; border-radius: 8px; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>AI Cybersecurity Assistant</h2>
    <div id="chat-box"></div>
    <input type="text" id="userInput" placeholder="پرسیارەکێ بکە...">
    <button onclick="getAIResponse()">ناردن</button>

    <script>
        async function getAIResponse() {
            const userInput = document.getElementById('userInput').value;
            const chatBox = document.getElementById('chat-box');
            if (!userInput) return;

            chatBox.innerHTML += `<p><b>تۆ:</b> ${userInput}</p>`;
            document.getElementById('userInput').value = '';

            // ل ڤێرێ، ژبەر ئەولەهیێ و ئاریشێن CORS، ئەم تنێ دێ نموونەکێ نیشان دەین
            chatBox.innerHTML += `<p><b>AI:</b> تە یێ دبێژی "${userInput}". ئەز یێ ئامادەمە بۆ هاریکاریێ، لێ دڤێت تو API Key-ێ خۆ ل پشت سێرڤەرەکێ دانی دا ب پاراستی بیت.</p>`;
        }
    </script>
</body>
</html>
